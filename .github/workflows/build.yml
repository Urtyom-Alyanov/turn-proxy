name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Packaging Tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm build-essential
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build Release (All members)
        run: |
          cargo build --release -p turn-proxy-server
          cargo build --release -p turn-proxy-client

      - name: Build Debian & RPM (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo deb -p turn-proxy-server
          cargo deb -p turn-proxy-client
          cargo generate-rpm -p server
          cargo generate-rpm -p client

      - name: Prepare Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p artifacts
          cp target/release/turn-proxy-server artifacts/
          cp target/release/turn-proxy-client artifacts/
          cp target/debian/*.deb artifacts/
          cp target/generate-rpm/*.rpm artifacts/
          tar -czvf artifacts/turn-proxy-linux-x64.tar.gz -C target/release turn-proxy-server turn-proxy-client

      - name: Prepare Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target/release/turn-proxy-server.exe" -Destination "artifacts/"
          Copy-Item "target/release/turn-proxy-client.exe" -Destination "artifacts/"
          Compress-Archive -Path "target/release/turn-proxy-server.exe", "target/release/turn-proxy-client.exe" -DestinationPath "artifacts/turn-proxy-windows-x64.zip"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.exe
            artifacts/turn-proxy-server
            artifacts/turn-proxy-client
          generate_release_notes: true
          draft: false
          prerelease: false